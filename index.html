<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SBM Interactive Map — Southern California Locations</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- MarkerCluster CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

    <link rel="stylesheet" href="css/map.css" />
</head>
<body>
    <!-- Header -->
    <header id="header">
        <h1><i class="fas fa-map-marked-alt"></i> SBM Interactive Map</h1>
        <span id="location-count">350+ Locations</span>
        <div id="header-controls">
            <button id="btn-print" title="Print Map"><i class="fas fa-print"></i> Print</button>
            <button id="btn-fit" title="Fit All Locations"><i class="fas fa-expand"></i> Fit All</button>
        </div>
    </header>

    <!-- Sidebar -->
    <aside id="sidebar">
        <!-- Search -->
        <div id="search-container">
            <input type="text" id="search-input" placeholder="Search by name, address, or zone..." />
            <button id="btn-search"><i class="fas fa-search"></i></button>
        </div>

        <!-- Zone Filters -->
        <div id="zone-filters">
            <h3>Zones <span id="zone-count"></span></h3>
            <div id="zone-list"></div>
        </div>

        <!-- Stats -->
        <div id="stats">
            <h3>Statistics</h3>
            <div id="stats-content"></div>
        </div>

        <!-- Search Results -->
        <div id="results-container">
            <h3>Results <span id="results-count"></span></h3>
            <div id="results-list"></div>
        </div>
    </aside>

    <!-- Map -->
    <main id="map"></main>

    <!-- Legend (print-only) -->
    <div id="print-legend">
        <h2>SBM Interactive Map — Zone Legend</h2>
        <div id="print-legend-content"></div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- MarkerCluster JS -->
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

    <script src="js/map.js"></script>
</body>
</html>
